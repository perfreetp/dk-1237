server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: data-permission-service

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/data_permission?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.datapermission.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

data-permission:
  jwt:
    secret: your-256-bit-secret-key-for-jwt-token-signing
    expiration: 86400000
    header: Authorization
    prefix: Bearer

  desensitization:
    enabled: true
    default-mask-char: "*"
    mask-rules:
      phone: "前3后4"
      email: "前2后@"
      idCard: "只显示前后4位"
      salary: "万为单位"

  alert:
    download-threshold: 100
    access-frequency-threshold: 500
    check-interval: 3600

  expiration:
    notice-days: 7,3,1,0
    notice-time: "09:00"

logging:
  level:
    root: INFO
    com.example.datapermission: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
